services:
  mongodb:
    image: mongodb/mongodb-community-server:latest
    container_name: food_optimiser_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./db/init:/docker-entrypoint-initdb.d

  api:
    build: ./backend
    container_name: food_optimiser_api
    ports:
      - "5098:8080"
    environment:
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=food_options_db
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: food_optimiser_frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  mongo_data:
